<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIS — Alumni</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="logo-mark">FIS</div>
    <div class="nav-section-label">MAIN</div>
    <a href="index.html" class="nav-item"><span class="nav-icon">⬡</span><span class="nav-label">Dashboard</span></a>
    <a href="readiness.html" class="nav-item"><span class="nav-icon">💚</span><span class="nav-label">Player Readiness</span></a>
    <div class="nav-divider"></div>
    <div class="nav-section-label">OPERATIONS</div>
    <a href="roster.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">Roster</span></a>
    <a href="recruiting.html" class="nav-item"><span class="nav-icon">🎯</span><span class="nav-label">Recruiting</span></a>
    <a href="schedule.html" class="nav-item"><span class="nav-icon">📅</span><span class="nav-label">Schedule</span></a>
    <a href="tasks.html" class="nav-item"><span class="nav-icon">✅</span><span class="nav-label">Staff Tasks</span></a>
    <div class="nav-divider"></div>
    <div class="nav-section-label">SPORT SCIENCE</div>
    <a href="training.html" class="nav-item"><span class="nav-icon">⚡</span><span class="nav-label">Training & Load</span></a>
    <a href="opponents.html" class="nav-item"><span class="nav-icon">🔍</span><span class="nav-label">Opponents</span></a>
    <div class="nav-divider"></div>
    <div class="nav-section-label">PROGRAM</div>
    <a href="academics.html" class="nav-item"><span class="nav-icon">🎓</span><span class="nav-label">Academics</span></a>
    <a href="budget.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-label">Budget</span></a>
    <a href="marketing.html" class="nav-item"><span class="nav-icon">📣</span><span class="nav-label">Marketing</span></a>
    <a href="alumni.html" class="nav-item active"><span class="nav-icon">🤝</span><span class="nav-label">Alumni</span></a>
    <a href="camps.html" class="nav-item"><span class="nav-icon">⛺</span><span class="nav-label">Camps</span></a>
  </nav>
  <div class="main">
    <header class="topbar">
      <div class="topbar-title">ALUMNI <span>NETWORK</span></div>
      <div class="topbar-actions">
        <button class="btn btn-gold" onclick="openAddModal()">+ Add Alumni</button>
        <div class="avatar">HC</div>
      </div>
    </header>
    <div class="page">
      <div class="stats-row" style="margin-bottom:20px;">
        <div class="stat-card" style="--accent:var(--gold);"><div class="stat-icon">🤝</div><div class="stat-label">Total Alumni</div><div class="stat-value" id="al-total" style="color:var(--gold2);">—</div></div>
        <div class="stat-card" style="--accent:var(--green);"><div class="stat-icon">⚽</div><div class="stat-label">Playing Pro</div><div class="stat-value" id="al-pro" style="color:var(--green);">—</div></div>
        <div class="stat-card" style="--accent:var(--blue);"><div class="stat-icon">💼</div><div class="stat-label">Mentors Available</div><div class="stat-value" id="al-mentors" style="color:var(--blue);">—</div></div>
        <div class="stat-card" style="--accent:var(--slate);"><div class="stat-icon">📅</div><div class="stat-label">Grad Classes</div><div class="stat-value" id="al-classes" style="color:var(--slate2);">—</div></div>
      </div>

      <!-- SEARCH -->
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
        <input class="form-input" id="alSearch" placeholder="Search alumni..." style="width:220px;" oninput="filterAlumni()">
        <select class="form-select" id="alStatus" onchange="filterAlumni()" style="width:160px;">
          <option value="">All Status</option>
          <option>Playing Professionally</option><option>Coaching</option><option>Working</option><option>Graduate School</option>
        </select>
        <select class="form-select" id="alMentor" onchange="filterAlumni()" style="width:150px;">
          <option value="">All Alumni</option>
          <option value="yes">Mentors Only</option>
        </select>
      </div>

      <div id="alumniGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">🤝 Add Alumni</div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="a-name" placeholder="Full name"></div>
      <div class="form-group"><label class="form-label">Grad Year</label><input class="form-input" id="a-grad" type="number" placeholder="2022"></div>
      <div class="form-group"><label class="form-label">Position Played</label>
        <select class="form-select" id="a-pos"><option>GK</option><option>CB</option><option>RB</option><option>LB</option><option>CDM</option><option>CM</option><option>RW</option><option>LW</option><option>ST</option></select>
      </div>
      <div class="form-group"><label class="form-label">Current Status</label>
        <select class="form-select" id="a-status">
          <option>Playing Professionally</option><option>Coaching</option><option>Working</option><option>Graduate School</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Current Club / Employer</label><input class="form-input" id="a-club" placeholder="Club or company name"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="a-email" type="email" placeholder="email@example.com"></div>
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:10px;">
      <input type="checkbox" id="a-mentor" style="width:16px;height:16px;accent-color:var(--gold);">
      <label class="form-label" style="margin:0;">Available as Mentor for current players</label>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="a-notes" placeholder="Career highlights, contact context..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="addAlumni()">Add to Network</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="config.js"></script>
<script>
let allAlumni = [];
function showToast(msg,dur=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function closeModal(){document.getElementById('addModal').classList.remove('open');}

function statusColor(s) {
  if (!s) return 'pill-slate';
  if (s.includes('Pro')) return 'pill-green';
  if (s.includes('Coach')) return 'pill-gold';
  if (s.includes('Graduate')) return 'pill-blue';
  return 'pill-slate';
}

function renderAlumni(list) {
  const grid = document.getElementById('alumniGrid');
  grid.innerHTML = list.length ? list.map(a => {
    const f = a.fields;
    return `<div class="card" style="transition:all 0.2s;cursor:default;" onmouseover="this.style.borderColor='rgba(201,151,58,0.3)'" onmouseout="this.style.borderColor=''">
      <div class="card-header">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:var(--white);">${f['Name']||f['Alumni Name']||'—'}</div>
          <div style="font-size:11px;color:var(--slate);margin-top:2px;">Class of ${f['Grad Year']||'—'} · ${f['Position Played']||'—'}</div>
        </div>
        ${f['Mentor Available']?'<span class="pill pill-gold">MENTOR</span>':''}
      </div>
      <div class="card-body" style="padding:12px 16px;">
        <div style="margin-bottom:8px;"><span class="pill ${statusColor(f['Current Status'])}">${f['Current Status']||'—'}</span></div>
        <div style="font-size:12px;color:var(--slate2);margin-bottom:4px;">📍 ${f['Current Club / Employer']||f['Employer']||'—'}</div>
        ${f['Email']?`<div style="font-size:12px;color:var(--blue);">✉️ ${f['Email']}</div>`:''}
        ${f['Notes']?`<div style="margin-top:8px;font-size:11px;color:var(--slate);padding:6px;background:rgba(0,0,0,0.15);border-radius:6px;">${f['Notes']}</div>`:''}
      </div>
    </div>`;
  }).join('') : '<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">🤝</div><div class="empty-text">No alumni records yet</div></div>';
}

async function loadAlumni() {
  try {
    allAlumni = await airtableFetch(FIS_CONFIG.TABLES.ALUMNI, { sort:[{field:'Grad Year',direction:'desc'}] });
    const pro = allAlumni.filter(a => (a.fields['Current Status']||'').includes('Pro'));
    const mentors = allAlumni.filter(a => a.fields['Mentor Available']);
    const classes = [...new Set(allAlumni.map(a => a.fields['Grad Year']).filter(Boolean))];
    document.getElementById('al-total').textContent = allAlumni.length;
    document.getElementById('al-pro').textContent = pro.length;
    document.getElementById('al-mentors').textContent = mentors.length;
    document.getElementById('al-classes').textContent = classes.length;
    renderAlumni(allAlumni);
  } catch(e) {
    document.getElementById('alumniGrid').innerHTML = `<div style="color:var(--red);grid-column:1/-1;padding:20px;">Error: ${e.message}</div>`;
  }
}

function filterAlumni() {
  const search = document.getElementById('alSearch').value.toLowerCase();
  const status = document.getElementById('alStatus').value;
  const mentorOnly = document.getElementById('alMentor').value === 'yes';
  let filtered = allAlumni.filter(a => {
    const f = a.fields;
    const name = (f['Name']||f['Alumni Name']||'').toLowerCase();
    if (search && !name.includes(search)) return false;
    if (status && f['Current Status'] !== status) return false;
    if (mentorOnly && !f['Mentor Available']) return false;
    return true;
  });
  renderAlumni(filtered);
}

function openAddModal(){document.getElementById('addModal').classList.add('open');}
async function addAlumni(){
  const name = document.getElementById('a-name').value.trim();
  if (!name){showToast('Name required');return;}
  try {
    await airtableCreate(FIS_CONFIG.TABLES.ALUMNI,{
      'Name':name,
      'Grad Year':parseInt(document.getElementById('a-grad').value)||null,
      'Position Played':document.getElementById('a-pos').value,
      'Current Status':document.getElementById('a-status').value,
      'Current Club / Employer':document.getElementById('a-club').value,
      'Email':document.getElementById('a-email').value,
      'Mentor Available':document.getElementById('a-mentor').checked,
      'Notes':document.getElementById('a-notes').value,
    });
    closeModal();showToast(`${name} added to network ✓`);loadAlumni();
  } catch(e){showToast(`Error: ${e.message}`);}
}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
loadAlumni();
</script>
</body>
</html>
